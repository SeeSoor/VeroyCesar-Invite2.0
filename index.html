<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Vero y Cesar</title>
</head>
<body>
    <header class="header">
        <div>
            <p class="nombres">Veronica y Cesar</p>
            <p class="date">28-Oct-2026</p>
        </div>
        <div class="titulo">
            <p>¡Nos Casamos!</p>
        </div>
    </header>
    <section class="dedicatoria">
        <p>Hay eventos en la vida que son muy especiales por si solos, pero poder compartirlos con quienes más queremos, los convierte en momentos únicos e inolvidables.</p>
<p>¡Te esperamos en nuestra boda!</p>
    </section>

    <section class="main">
        <div class="faltan">
            <p>¡Nuestro Día!</p>
        </div>
        <div class="countdown">
            <div class="time">
                <span id="days">00</span>
                <p>Días</p>
            </div>
            <div class="time">
                <span id="hours">00</span>
                <p>Horas</p>
            </div>
            <div class="time">
                <span id="minutes">00</span>
                <p>Minutos</p>
            </div>
            <div class="time">
                <span id="seconds">00</span>
                <p>Segundos</p>
            </div>
        </div>
        <script src="script.js"></script>
    </section>
</body>
</html>
